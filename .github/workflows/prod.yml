name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "========== DEPLOYMENT STARTED =========="
            
            cd /root/Project
            
            echo "Current directory: $(pwd)"
            echo "Files in Project:"
            ls -la
            
            echo ""
            echo "-------- Pulling latest code --------"
            cd /root/Project/factory_frontend
            
            # Force reset and pull
            git fetch origin main
            git reset --hard origin/main
            
            if [ $? -ne 0 ]; then
              echo "ERROR: Git pull failed!"
              echo "Trying alternative method..."
              
              # Alternative: remove and clone again
              cd /root/Project
              rm -rf factory_frontend
              git clone https://github.com/Jamshed647/factory_frontend.git
              cd factory_frontend
            fi
            
            echo "Git status after pull:"
            git status
            
            cd /root/Project
            
            echo ""
            echo "-------- Current directory: $(pwd) --------"
            
            echo ""
            echo "-------- Current containers --------"
            docker ps -a
            
            echo ""
            echo "-------- Rebuilding frontend container --------"
            docker compose build --no-cache frontend
            
            if [ $? -ne 0 ]; then
              echo "ERROR: Docker build failed!"
              exit 1
            fi
            
            echo ""
            echo "-------- Restarting frontend container --------"
            docker compose up -d frontend
            
            if [ $? -ne 0 ]; then
              echo "ERROR: Docker up failed!"
              exit 1
            fi
            
            echo ""
            echo "-------- Container status after deployment --------"
            docker ps -a | grep frontend
            
            echo ""
            echo "-------- Last 20 lines of frontend logs --------"
            docker compose logs frontend --tail 20
            
            echo ""
            echo "========== DEPLOYMENT FINISHED =========="



















