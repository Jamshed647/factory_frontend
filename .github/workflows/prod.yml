name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=frontend-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          --build-arg NEXT_PUBLIC_API_URL=http://69.62.79.100:3060/api/v1 \
          -t jamshed86/factory:${IMAGE_TAG} \
          .

      - name: Push Docker Image
        run: |
          docker push jamshed86/factory:${IMAGE_TAG}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "Logging into Docker Hub"

            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_TOKEN }}

            echo "Using image tag frontend-${{ github.run_number }}"

            docker pull jamshed86/factory:frontend-${{ github.run_number }}

            cd /root/Project

            export DOCKER_IMAGE_FRONTEND=jamshed86/factory:frontend-${{ github.run_number }}

            docker compose up -d --build frontend 

            echo "Deployment finished"






































